name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  verify:
    name: Verify App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check all Python files
        run: |
          git ls-files "*.py" | xargs -r python -m py_compile

      - name: Import app and initialize database
        env:
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///ci_test.db
        run: |
          python - <<'PY'
          import app
          app.init_app()
          print("App import + init_app() succeeded")
          PY

      - name: Runtime smoke test (start server + health URL)
        env:
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///ci_smoke.db
          HOST: 127.0.0.1
          PORT: 5001
        run: |
          python app.py > server.log 2>&1 &
          APP_PID=$!

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5001/login > /dev/null; then
              echo "Server smoke test passed"
              kill "$APP_PID"
              wait "$APP_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "Server failed smoke test. Logs:"
          cat server.log
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          exit 1

