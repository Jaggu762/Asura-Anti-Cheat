{% extends 'base.html' %}
{% block title %}Add User — Asura{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="ph">
        <div class="ph-icon"><i class="bi bi-person-plus"></i></div>
        <div class="ph-text">
          <h2>Add User</h2>
          <p>Create a new account</p>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" placeholder="Enter password" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Role</label>
              <select class="form-select" name="role" required>
                <option value="student">Student</option>
                <option value="lecturer">Lecturer</option>
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-person-plus me-2"></i>Create User
              </button>
              <a class="btn btn-secondary" href="{{ url_for('admin_dashboard') }}">
                <i class="bi bi-x me-1"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
