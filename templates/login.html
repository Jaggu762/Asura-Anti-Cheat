{% extends 'base.html' %}
{% block title %}Login — Asura{% endblock %}
{% block content %}
  <div class="auth-wrapper d-flex align-items-center justify-content-center">
    <div class="auth-card">

      <!-- Brand -->
      <div class="text-center mb-4">
        <img src="{{ url_for('image_file', filename='asura.png') }}" alt="Asura" class="login-logo mb-3">
        <h3 class="mb-1">Welcome back</h3>
        <p class="mb-0" style="font-size:.875rem;color:var(--txt-muted);">Sign in to your Asura dashboard</p>
      </div>

      <!-- Security chip -->
      <div class="text-center mb-4">
        <span class="security-chip">
          <i class="bi bi-shield-fill-check"></i> Secure sign-in
        </span>
      </div>

      <form method="post" action="{{ url_for('login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label" for="login-user">Username</label>
          <div class="input-icon-wrap">
            <i class="bi bi-person input-ico"></i>
            <input class="form-control with-ico" id="login-user" name="username" placeholder="Enter your username" required autocomplete="username">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="login-pass">Password</label>
          <div class="input-icon-wrap">
            <i class="bi bi-lock input-ico"></i>
            <input type="password" class="form-control with-ico" id="login-pass" name="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="remember" name="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" style="font-size:.82rem;">Forgot password?</a>
        </div>

        <div class="d-grid">
          <button class="btn btn-primary btn-lg" type="submit">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </div>
      </form>

      <div class="text-center mt-4" style="font-size:.82rem;color:var(--txt-muted);">
        No account? Contact <a href="mailto:admin@dtemipre.com">admin@dtemipre.com</a>
      </div>
    </div>
  </div>

  <style>
    .auth-wrapper {
      min-height: calc(100vh - 140px);
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2.25rem 2rem;
      box-shadow: 0 16px 50px rgba(0,0,0,.6), 0 0 0 1px rgba(79,142,247,.06);
    }
    .login-logo {
      height: 52px;
      width: auto;
      filter: drop-shadow(0 4px 16px rgba(79,142,247,.4));
    }
    .security-chip {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(52,211,153,.1);
      color: #34d399;
      border: 1px solid rgba(52,211,153,.2);
      border-radius: 50px;
      padding: .25rem .85rem;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .input-icon-wrap { position: relative; }
    .input-ico {
      position: absolute;
      left: .85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--txt-muted);
      pointer-events: none;
      z-index: 5;
    }
    .form-control.with-ico { padding-left: 2.5rem !important; }
    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem 1.25rem; }
    }
  </style>
{% endblock %}
