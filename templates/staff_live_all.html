{% extends 'base.html' %}
{% block title %}Global Live Feed — Asura{% endblock %}
{% block content %}

  <div class="ph">
    <div class="ph-icon"><i class="bi bi-broadcast" style="color:var(--clr-danger);"></i></div>
    <div class="ph-text">
      <h2>Global Live Feed</h2>
      <p>Real-time events from all active attempts — Staff & Admin only</p>
    </div>
  </div>

  <div class="mb-3 d-flex align-items-center gap-3">
    <span class="badge bg-danger" id="live-indicator">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#fff;margin-right:4px;animation:blink 1s steps(1) infinite;"></span>
      Live
    </span>
    <span style="color:var(--txt-muted);font-size:.85rem;">Events: <strong id="total-count">0</strong></span>
  </div>

  <div id="global-log" class="live-feed"></div>

  <style>
    .live-feed {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      max-height: 70vh;
      overflow-y: auto;
      padding: .75rem;
      display: flex;
      flex-direction: column-reverse;
      gap: .5rem;
    }
    .live-entry {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: .6rem .875rem;
      font-size: .85rem;
    }
    .live-ts { color: var(--txt-muted); font-size: .75rem; }
    .live-attempt { color: var(--accent); font-size: .78rem; font-weight: 600; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const container = document.getElementById('global-log');
    let count = 0;

    socket.on('connect', () => socket.emit('join_all_attempts', {}));
    socket.on('joined_all', () => console.log('joined global room'));

    socket.on('attempt_event_all', function(payload){
      try {
        const r = payload.record;
        const div = document.createElement('div');
        div.className = 'live-entry';
        div.innerHTML = `<div class="d-flex align-items-center gap-2 mb-1">
          <span class="live-ts">${r.ts}</span>
          <span class="live-attempt">attempt #${payload.attempt_id}</span>
          <span class="event-tag">${r.event}</span>
        </div>
        <pre class="mb-0">${JSON.stringify(r.data||{}, null, 2)}</pre>`;
        container.prepend(div);
        count++;
        document.getElementById('total-count').textContent = count;
      } catch(e){ console.warn(e); }
    });
  </script>

{% endblock %}
