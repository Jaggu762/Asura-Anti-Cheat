{% extends 'base.html' %}
{% block title %}Edit User — Asura{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="ph">
        <div class="ph-icon"><i class="bi bi-person-gear"></i></div>
        <div class="ph-text">
          <h2>Edit User</h2>
          <p>{{ user.username }}</p>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" value="{{ user.username }}" readonly
                     style="opacity:.65;cursor:not-allowed;">
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current">
            </div>
            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-select" name="role" required>
                <option value="student"  {% if user.role=='student'  %}selected{% endif %}>Student</option>
                <option value="lecturer" {% if user.role=='lecturer' %}selected{% endif %}>Lecturer</option>
                <option value="staff"    {% if user.role=='staff'    %}selected{% endif %}>Staff</option>
                <option value="admin"    {% if user.role=='admin'    %}selected{% endif %}>Admin</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label">Batch (students only)</label>
              <select class="form-select" name="batch_id">
                <option value="">— none —</option>
                {% for b in batches %}
                  <option value="{{ b.id }}" {% if user.batch and user.batch.id==b.id %}selected{% endif %}>{{ b.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-floppy me-2"></i>Save Changes
              </button>
              <a class="btn btn-secondary" href="{{ url_for('admin_dashboard') }}">
                <i class="bi bi-x me-1"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
