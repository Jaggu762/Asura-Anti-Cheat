{% extends 'base.html' %}
{% block title %}Create Exam — Asura{% endblock %}
{% block content %}

  <div class="ph">
    <div class="ph-icon"><i class="bi bi-journal-plus"></i></div>
    <div class="ph-text">
      <h2>Create Exam</h2>
      <p>Set up a new examination for a batch</p>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
      <div class="card">
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input class="form-control" name="title" placeholder="e.g. Midterm Exam 2025" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="3" placeholder="Optional exam description or instructions…"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Batch</label>
              <select class="form-select" name="batch_id" required>
                <option value="" disabled selected>Select batch…</option>
                {% for b in batches %}
                  <option value="{{ b.id }}">{{ b.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label">Duration (minutes)</label>
              <input type="number" min="1" class="form-control" name="duration_minutes" placeholder="e.g. 60" required>
              <div class="form-text">Students have this many minutes from when they click Start. The lecturer starts the exam to open the window.</div>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-check-lg me-2"></i>Create Exam
              </button>
              <a class="btn btn-secondary" href="{{ url_for('teacher_exams') }}">
                <i class="bi bi-x me-1"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
